<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

        <title>My Playlist for You</title>

        <link rel="stylesheet" href="playlist.css">

        <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    </head>

    <body>

        <!-- HEADER -->
        <header>

            <input type="checkbox" id="toggler">
            <label for="toggler" class="fas fa-bars"></label>
            <a href="index.html" class="logo">
                Sincerely, from Fayyaz<span>.</span>
            </a>

            <div class="icons">
                <a href="birthday.html" class="fas fa-house"></a>
                <p>|</p>
                <a href="favorite.html" class="fas fa-heart"></a>
                <p>|</p>
                <a href="playlist.html" class="fas fa-music"></a>
                <p>|</p>
                <a href="game.html" class="fas fa-dice"></a>
                <p>|</p>
                <a href="photobooth.html" class="fas fa-camera"></a>
            </div>

        </header>
        <!-- MAIN CONTAINER -->
        <section class="spotify-container">

            <!-- PROFILE -->
            <div class="profile-section">
                <img src="Playlist pictures/1. Profile.png" class="profile-pic">

                <div class="profile-text">
                    <p class="small-text">
                        Profile
                    </p>

                    <h1> Santet </h1>
                </div>
            </div>

            <!-- PLAYLIST -->
            <div class="playlist-section">
                <h2>Public Playlists</h2>

                <div class="playlist-grid">

                    <!-- Playlist 1 -->
                    <div class="playlist-card">
                        <a href="playlist-midnight-lovers.html">
                            <img src="Playlist pictures/2. Midnight Lovers.png" alt="Midnight Lovers">
                            <span>Midnight Lovers</span>
                        </a>
                    </div>

                    <!-- Playlist 2 -->
                    <div class="playlist-card">
                        <a href="playlist-sunflovers.html">
                            <img src="Playlist pictures/3. Sunflovers.png" alt="Sunflovers">
                            <span>Sunflovers 🌻</span>
                        </a>
                    </div>

                    <!-- Playlist 3 -->
                    <div class="playlist-card">
                        <a href="playlist-go-go.html">
                            <img src="Playlist pictures/4. GO! GO!.png" alt="GO! GO!">
                            <span>GO! GO!</span>
                        </a>
                    </div>

                </div>
            </div>
        </section>

    <script src="playlist.js"></script>

    </body>

</html>
