<!-- JAVA SCRIPT -->
<script>
    window.addEventListener("load", () => {

        const music =
            document.getElementById("bgMusic");

        if (
            sessionStorage.getItem("playMusic")
            === "true"
        ) {

            music.play();

            sessionStorage.removeItem(
                "playMusic"
            );
        }
    });
</script>

<!-- MUSIC -->
<script>

const music =
    document.getElementById("bgMusic");

const slider =
    document.getElementById("volumeSlider");

/* Default volume */

music.volume = 0.5;

/* Update volume */

slider.addEventListener("input", function(){

    music.volume = this.value / 100;

});

</script>

<!-- CONFETTI EFFECTS -->
<script>

window.addEventListener("load", function() {

    if (sessionStorage.getItem("showConfetti")) {

        /* Initial big burst */

        confetti({
            particleCount: 250,
            spread: 150,
            origin: { y: 0.6 }
        });

        /* Side confetti for 3 seconds */

        const duration = 3000;
        const end = Date.now() + duration;

        (function frame() {

            confetti({
                particleCount: 3,
                angle: 60,
                spread: 55,
                origin: { x: 0 }
            });

            confetti({
                particleCount: 3,
                angle: 120,
                spread: 55,
                origin: { x: 1 }
            });

            if (Date.now() < end) {
                requestAnimationFrame(frame);
            }

        })();

        /* Prevent replay on refresh */

        sessionStorage.removeItem("showConfetti");
    }

});

</script>
